<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="初動ナビ">
  <title>初動ナビ</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQ8d6uztQ2qjIkcX9cc1BChhH9jK5kc=" crossorigin="">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="app-shell" aria-label="初動ナビ">
    <div id="map" class="map-stage" aria-label="地図表示エリア"></div>

    <section class="control-panel" aria-label="操作パネル">
      <form id="searchForm" class="search-form" action="#" method="get">
        <label class="sr-only" for="destination">目的地検索</label>
        <input id="destination" name="destination" type="search" inputmode="search" autocomplete="off" placeholder="目的地を入力">
        <button id="searchButton" class="primary-button" type="submit">検索</button>
      </form>

      <p id="searchStatus" class="status-text" aria-live="polite">現在地取得後に目的地を検索できます。</p>
      <p id="routeStatus" class="route-info" aria-live="polite" hidden></p>
      <ol id="searchResults" class="results-list" aria-label="検索結果"></ol>

      <div class="status-row">
        <p id="locationStatus" class="status-text">現在地を確認しています...</p>
        <button id="refreshLocationButton" class="secondary-button" type="button">現在地修正</button>
      </div>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./js/location.js"></script>
  <script src="./js/search.js"></script>
  <script src="./js/routing.js"></script>
  <script src="./js/reroute.js"></script>
  <script src="./js/pwa.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
